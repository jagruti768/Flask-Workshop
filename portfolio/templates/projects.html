{% extends 'base.html' %}

{% block content %}

<section class="projects-section">
    <h2>My Projects</h2>

    <div class="project-grid">
        {% for project in projects %}
        <div class="project-card">
            <h3>{{ project.title }}</h3>
            <p>{{ project.desc }}</p>
        </div>
        {% endfor %}
    </div>

</section>

{% endblock %}
